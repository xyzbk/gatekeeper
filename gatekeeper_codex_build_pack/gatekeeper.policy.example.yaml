version: 1

repository:
  defaultBase: master

review:
  linkedIssue:
    required: false
    enforcement: advisory

  description:
    required: true
    enforcement: required

  maxChangedFiles:
    value: 30
    enforcement: required

  maxChangedLines:
    value: 1200
    enforcement: advisory

paths:
  ignore:
    - node_modules/**
    - dist/**
    - build/**
    - coverage/**
    - vendor/**
    - '**/*.min.js'
    - '**/*.map'

tests:
  relationships:
    - id: application-code-needs-tests
      source:
        - src/**
        - packages/**
      tests:
        - tests/**
        - '**/*.test.ts'
        - '**/*.spec.ts'
      enforcement: required

documentation:
  relationships:
    - id: public-api-needs-docs
      source:
        - src/public/**
        - packages/api/**
      documentation:
        - docs/**
        - CHANGELOG.md
      enforcement: required

riskZones:
  - id: authentication
    paths:
      - src/auth/**
      - src/security/**
    level: critical
    verdictFloor: ESCALATE
    requirements:
      - tests
      - linkedIssue

  - id: migrations
    paths:
      - migrations/**
    level: high
    verdictFloor: ESCALATE

protectedPaths:
  - id: generated-lock
    paths:
      - internal/protected/**
    enforcement: hard
    message: This path requires an explicitly authorized workflow.

architecture:
  importBoundaries:
    - id: routes-must-not-access-repositories
      from:
        - src/routes/**
      deny:
        - src/repositories/**
      enforcement: required
      rationale: Routes call services; services own repository access.

generatedFiles:
  deny:
    - dist/**
    - coverage/**
  enforcement: hard
